<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ランニングコスト診断チェックリスト｜東北コピー販売</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif; background: #f4f6f9; color: #222; font-size: 14px; }
  .page-wrap { max-width: 860px; margin: 0 auto; padding: 24px 16px 60px; }

  .page-header { background: #1e3a6e; color: #fff; border-radius: 10px; padding: 20px 24px; margin-bottom: 24px; }
  .page-header .logo { font-size: 11px; opacity: 0.7; margin-bottom: 4px; letter-spacing: 1px; }
  .page-header h1 { font-size: 20px; font-weight: 600; }
  .page-header p { font-size: 12px; opacity: 0.8; margin-top: 6px; }

  .company-field { background: #fff; border-radius: 10px; border: 1px solid #dde1e9; padding: 16px 20px; margin-bottom: 16px; display: flex; align-items: center; gap: 12px; }
  .company-field label { font-size: 13px; font-weight: 600; white-space: nowrap; color: #1e3a6e; }
  .company-field input { flex: 1; border: 1px solid #cdd2db; border-radius: 6px; padding: 7px 10px; font-size: 14px; }
  .company-field input:focus { outline: none; border-color: #1e3a6e; }

  .section { background: #fff; border-radius: 10px; border: 1px solid #dde1e9; margin-bottom: 14px; overflow: hidden; }
  .section-header { background: #1e3a6e; color: #fff; padding: 11px 18px; font-size: 14px; font-weight: 600; display: flex; justify-content: space-between; align-items: center; cursor: pointer; user-select: none; }
  .section-header .toggle { font-size: 12px; transition: transform 0.2s; display: inline-block; }
  .section-header.closed .toggle { transform: rotate(-90deg); }
  .section-body.hidden { display: none; }

  .col-headers { display: grid; grid-template-columns: 2.2fr 1fr 1fr 1fr 1fr; gap: 6px; padding: 8px 18px; background: #f0f3f8; border-bottom: 1px solid #dde1e9; }
  .col-h { font-size: 11px; color: #666; text-align: right; font-weight: 600; }
  .col-h:first-child { text-align: left; }
  .col-h.improved { color: #0f6e56; }

  .item-row { display: grid; grid-template-columns: 2.2fr 1fr 1fr 1fr 1fr; gap: 6px; padding: 7px 18px; border-bottom: 1px solid #eef0f5; align-items: center; }
  .item-row label { font-size: 12px; color: #333; line-height: 1.4; }
  .item-row input[type="number"] {
    width: 100%; border: 1px solid #cdd2db; border-radius: 5px; padding: 5px 8px;
    font-size: 12px; text-align: right; background: #fff; color: #222; height: 30px;
  }
  .item-row input[type="number"]:focus { outline: none; border-color: #1e3a6e; }
  .item-row input.improved { border-color: #0f6e56; }

  .note-row { padding: 8px 18px 12px; }
  .note-row textarea {
    width: 100%; border: 1px solid #dde1e9; border-radius: 5px; padding: 6px 10px;
    font-size: 12px; color: #555; background: #f9fafc; resize: vertical;
    min-height: 38px; font-family: inherit;
  }

  .totals-card { background: #fff; border-radius: 10px; border: 1px solid #dde1e9; padding: 20px 24px; margin-top: 6px; }
  .totals-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 14px; }
  .total-cell { background: #f0f3f8; border-radius: 8px; padding: 12px; text-align: center; }
  .total-cell .t-label { font-size: 11px; color: #666; margin-bottom: 4px; }
  .total-cell .t-val { font-size: 20px; font-weight: 600; color: #1e3a6e; }
  .total-cell.improved .t-val { color: #0f6e56; }
  .saving-row { display: flex; justify-content: space-between; align-items: center; background: #f0f3f8; border-radius: 8px; padding: 14px 18px; }
  .saving-left .s-label { font-size: 12px; color: #666; }
  .saving-left .s-val { font-size: 22px; font-weight: 700; color: #0f6e56; margin-top: 2px; }
  .saving-right .s-pct { font-size: 13px; color: #666; }

  .submit-area { margin-top: 20px; text-align: center; }
  .submit-area p { font-size: 12px; color: #888; margin-bottom: 10px; }
  .btn-submit {
    background: #1e3a6e; color: #fff; border: none; border-radius: 8px;
    padding: 14px 48px; font-size: 15px; font-weight: 600; cursor: pointer;
    transition: background 0.2s;
  }
  .btn-submit:hover { background: #162d56; }
  .btn-submit:disabled { background: #aaa; cursor: not-allowed; }
  .msg-success { margin-top: 14px; color: #0f6e56; font-weight: 600; font-size: 14px; display: none; }
  .msg-error   { margin-top: 14px; color: #c0392b; font-size: 13px; display: none; }

  @media (max-width: 600px) {
    .col-headers, .item-row { grid-template-columns: 1.6fr 1fr 1fr 1fr 1fr; font-size: 11px; padding: 6px 10px; }
    .totals-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>
<div class="page-wrap">

  <div class="page-header">
    <div class="logo">TOHOKU COPY SALE</div>
    <h1>ランニングコスト診断チェックリスト</h1>
    <p>各項目に金額を入力し、最後に「スプレッドシートに送信」ボタンを押してください。</p>
  </div>

  <div class="company-field">
    <label>会社名</label>
    <input type="text" id="companyName" placeholder="例：株式会社〇〇" />
  </div>

  <div id="sections"></div>

  <div class="totals-card">
    <div class="totals-grid">
      <div class="total-cell"><div class="t-label">初年度 合計</div><div class="t-val" id="tot0">¥0</div></div>
      <div class="total-cell"><div class="t-label">2年目 合計</div><div class="t-val" id="tot1">¥0</div></div>
      <div class="total-cell"><div class="t-label">3年目 合計</div><div class="t-val" id="tot2">¥0</div></div>
      <div class="total-cell improved"><div class="t-label">改善後 合計</div><div class="t-val" id="tot3">¥0</div></div>
    </div>
    <div class="saving-row">
      <div class="saving-left">
        <div class="s-label">削減額（初年度 → 改善後）</div>
        <div class="s-val" id="saving">¥0</div>
      </div>
      <div class="saving-right">
        <div class="s-pct" id="saving-pct">削減率 —</div>
      </div>
    </div>
  </div>

  <div class="submit-area">
    <p>入力内容を確認のうえ送信してください。</p>
    <button class="btn-submit" id="submitBtn" onclick="submitData()">スプレッドシートに送信</button>
    <div class="msg-success" id="msgSuccess">✓ スプレッドシートに登録しました！</div>
    <div class="msg-error"   id="msgError"></div>
  </div>

</div>

<script>
// =============================================
// ★ GASデプロイ後にWebアプリURLをここに貼る
const GAS_URL = "https://script.google.com/macros/s/AKfycbwRXYNssLUHrC9CVi1VOwHaKMdBnoWjXaLL6EVVrfqi72_rLSXkMM_U5sRZBo393aAjQg/exec";
// =============================================

const SECTIONS = [
  { name: "施設関連費", items: ["オフィス・店舗の賃貸料（共益費）","電気代","ガス代","水道代","建物の修繕費","清掃業者との保守契約費","事業所ごみ・産業廃棄物処理費"] },
  { name: "機器関連費", items: ["OA機器（PC、プリンタ、コピー機など）購入・リース","サーバ・ネットワーク機器","ソフトウェアライセンス費用","保守契約費用（PC、プリンター）","減価償却費（資産の償却）","リース料（車両・設備など）","その他保守費用"] },
  { name: "通信費",   items: ["電話代（固定・携帯）","インターネット回線費","クラウドサービス利用料","郵便料金"] },
  { name: "外注費",   items: ["デザイン・制作外注","コンサルティング費用","顧問料（会計士・税務士・社労士・弁護士）"] },
  { name: "販管費",   items: ["広告費","販促グッズ制作費","展示会出展費","営業交通費"] },
  { name: "その他",   items: ["配送料・運送費","倉庫保管料","梱包材費","保険関連"] },
  { name: "消耗品",   items: ["名刺","封筒","事務用品全般"] }
];
const COLS = ["初年度","2年目","3年目","改善後"];

// セクション生成
const container = document.getElementById("sections");
SECTIONS.forEach((sec, si) => {
  const div = document.createElement("div");
  div.className = "section";
  const rowsHtml = sec.items.map((item, ri) =>
    `<div class="item-row">
      <label>${item}</label>
      ${COLS.map((col, ci) =>
        `<input type="number" id="inp_${si}_${ri}_${ci}" min="0" step="100"
          placeholder="0" class="${ci===3?'improved':''}" oninput="recalc()" />`
      ).join("")}
    </div>`
  ).join("");
  div.innerHTML = `
    <div class="section-header" onclick="toggleSec(this)">
      <span>${sec.name}</span><span class="toggle">▼</span>
    </div>
    <div class="section-body">
      <div class="col-headers">
        <div class="col-h">項目</div>
        ${COLS.map((c,i)=>`<div class="col-h${i===3?' improved':''}">${c}</div>`).join("")}
      </div>
      ${rowsHtml}
      <div class="note-row"><textarea id="note_${si}" placeholder="備考"></textarea></div>
    </div>`;
  container.appendChild(div);
});

function toggleSec(header) {
  header.nextElementSibling.classList.toggle("hidden");
  header.classList.toggle("closed");
}

function fmt(n) { return "¥" + Math.round(n).toLocaleString("ja-JP"); }

function recalc() {
  const t = [0,0,0,0];
  SECTIONS.forEach((_, si) => {
    SECTIONS[si].items.forEach((__, ri) => {
      COLS.forEach((_, ci) => {
        t[ci] += parseFloat(document.getElementById(`inp_${si}_${ri}_${ci}`)?.value) || 0;
      });
    });
  });
  for(let i=0;i<4;i++) document.getElementById(`tot${i}`).textContent = fmt(t[i]);
  const diff = t[0] - t[3];
  document.getElementById("saving").textContent = fmt(Math.abs(diff));
  document.getElementById("saving-pct").textContent =
    "削減率 " + (t[0] > 0 ? (diff / t[0] * 100).toFixed(1) : "0.0") + "%";
}

function collectData() {
  const sections = {};
  const totals = {};
  SECTIONS.forEach((sec, si) => {
    sections[sec.name] = {};
    sec.items.forEach((item, ri) => {
      sections[sec.name][item] = {};
      COLS.forEach((col, ci) => {
        sections[sec.name][item][col] = parseFloat(document.getElementById(`inp_${si}_${ri}_${ci}`)?.value) || 0;
      });
    });
    sections[sec.name]["備考"] = document.getElementById(`note_${si}`)?.value || "";
  });
  let t = [0,0,0,0];
  SECTIONS.forEach((sec, si) => {
    sec.items.forEach((item) => {
      COLS.forEach((col, ci) => { t[ci] += sections[sec.name][item][col]; });
    });
  });
  COLS.forEach((col, ci) => totals[col] = t[ci]);
  return { companyName: document.getElementById("companyName").value.trim(), sections, totals };
}

function submitData() {
  const payload = collectData();
  const btn = document.getElementById("submitBtn");
  const msgOk  = document.getElementById("msgSuccess");
  const msgErr = document.getElementById("msgError");

  btn.disabled = true;
  btn.textContent = "送信中...";
  msgOk.style.display = "none";
  msgErr.style.display = "none";

  // GAS WebアプリはCORSヘッダーを付与できないため no-cors で送信。
  // レスポンス本文は読めないが、データはGAS側で正常に受信・記録される。
  fetch(GAS_URL, {
    method: "POST",
    mode: "no-cors",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  })
  .then(() => {
    // no-corsではステータスを判定できないため、到達した時点で成功とみなす
    msgOk.style.display = "block";
    btn.textContent = "送信完了";
  })
  .catch(err => {
    msgErr.textContent = "送信できませんでした。ネットワークを確認してください。(" + err.message + ")";
    msgErr.style.display = "block";
    btn.disabled = false;
    btn.textContent = "スプレッドシートに送信";
  });
}
</script>
</body>
</html>
