<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ランニングコスト診断チェックリスト｜東北コピー販売</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif; background: #f4f6f9; color: #222; font-size: 14px; }
  .page-wrap { max-width: 980px; margin: 0 auto; padding: 24px 16px 60px; }

  .page-header { background: #1e3a6e; color: #fff; border-radius: 10px; padding: 20px 24px; margin-bottom: 24px; }
  .page-header .logo { font-size: 11px; opacity: 0.7; margin-bottom: 4px; letter-spacing: 1px; }
  .page-header h1 { font-size: 20px; font-weight: 600; }
  .page-header p { font-size: 12px; opacity: 0.8; margin-top: 6px; }

  .company-field { background: #fff; border-radius: 10px; border: 1px solid #dde1e9; padding: 16px 20px; margin-bottom: 16px; display: flex; align-items: center; gap: 12px; }
  .company-field label { font-size: 13px; font-weight: 600; white-space: nowrap; color: #1e3a6e; }
  .company-field input { flex: 1; border: 1px solid #cdd2db; border-radius: 6px; padding: 7px 10px; font-size: 14px; }
  .company-field input:focus { outline: none; border-color: #1e3a6e; }

  .section { background: #fff; border-radius: 10px; border: 1px solid #dde1e9; margin-bottom: 14px; overflow: hidden; }
  .section-header { background: #1e3a6e; color: #fff; padding: 11px 18px; font-size: 14px; font-weight: 600; display: flex; justify-content: space-between; align-items: center; cursor: pointer; user-select: none; }
  .section-header .toggle { font-size: 12px; display: inline-block; transition: transform 0.2s; }
  .section-header.closed .toggle { transform: rotate(-90deg); }
  .section-body.hidden { display: none; }

  /* 6列グリッド: ラベル / 1回目 / 2回目 / 3回目 / 改善額①/ 改善額② */
  .col-headers { display: grid; grid-template-columns: 2fr 0.8fr 0.8fr 0.8fr 0.9fr 0.9fr; gap: 4px; padding: 8px 18px; background: #f0f3f8; border-bottom: 1px solid #dde1e9; }
  .col-h { font-size: 10px; color: #666; text-align: right; font-weight: 600; line-height: 1.3; }
  .col-h:first-child { text-align: left; }
  .col-h.kaizen { color: #0f6e56; }

  .item-row { display: grid; grid-template-columns: 2fr 0.8fr 0.8fr 0.8fr 0.9fr 0.9fr; gap: 4px; padding: 6px 18px; border-bottom: 1px solid #eef0f5; align-items: center; }
  .item-row label { font-size: 11px; color: #333; line-height: 1.4; }
  .item-row input[type="number"] {
    width: 100%; border: 1px solid #cdd2db; border-radius: 5px; padding: 4px 6px;
    font-size: 11px; text-align: right; background: #fff; color: #222; height: 28px;
  }
  .item-row input[type="number"]:focus { outline: none; border-color: #1e3a6e; }
  .item-row .kaizen-val {
    font-size: 11px; text-align: right; padding: 4px 6px; height: 28px;
    display: flex; align-items: center; justify-content: flex-end;
    border-radius: 5px; font-weight: 600;
  }
  .kaizen-val.down { color: #0f6e56; background: #eaf3de; }
  .kaizen-val.up   { color: #c0392b; background: #fdecea; }
  .kaizen-val.zero { color: #888;    background: #f5f5f5; }

  .note-row { padding: 8px 18px 12px; }
  .note-row textarea {
    width: 100%; border: 1px solid #dde1e9; border-radius: 5px; padding: 6px 10px;
    font-size: 12px; color: #555; background: #f9fafc; resize: vertical;
    min-height: 38px; font-family: inherit;
  }

  /* 合計カード */
  .totals-card { background: #fff; border-radius: 10px; border: 1px solid #dde1e9; padding: 20px 24px; margin-top: 6px; }
  .totals-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 14px; }
  .total-cell { background: #f0f3f8; border-radius: 8px; padding: 10px; text-align: center; }
  .total-cell .t-label { font-size: 10px; color: #666; margin-bottom: 4px; line-height: 1.3; }
  .total-cell .t-val { font-size: 16px; font-weight: 700; color: #1e3a6e; }
  .total-cell.kaizen .t-val { color: #0f6e56; }
  .total-cell.kaizen-up .t-val { color: #c0392b; }

  .submit-area { margin-top: 20px; text-align: center; }
  .submit-area p { font-size: 12px; color: #888; margin-bottom: 10px; }
  .btn-submit {
    background: #1e3a6e; color: #fff; border: none; border-radius: 8px;
    padding: 14px 48px; font-size: 15px; font-weight: 600; cursor: pointer;
    transition: background 0.2s;
  }
  .btn-submit:hover { background: #162d56; }
  .btn-submit:disabled { background: #aaa; cursor: not-allowed; }

  .result-area { display: none; margin-top: 24px; background: #fff; border-radius: 10px; border: 1px solid #dde1e9; padding: 24px; text-align: center; }
  .result-area .success-msg { font-size: 16px; font-weight: 600; color: #0f6e56; margin-bottom: 6px; }
  .result-area .success-sub { font-size: 12px; color: #888; margin-bottom: 20px; }
  .btn-download {
    background: #0f6e56; color: #fff; border: none; border-radius: 8px;
    padding: 12px 36px; font-size: 14px; font-weight: 600; cursor: pointer;
    transition: background 0.2s;
  }
  .btn-download:hover { background: #0a5240; }
  .msg-error { margin-top: 14px; color: #c0392b; font-size: 13px; display: none; }

  /* JPEG用サマリー */
  #summary-canvas {
    position: fixed; left: -9999px; top: 0; display: none;
    width: 900px; background: #fff; padding: 40px;
    font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
  }
  #summary-canvas .sc-header { background: #1e3a6e; color: #fff; padding: 20px 24px; border-radius: 8px; margin-bottom: 20px; }
  #summary-canvas .sc-header .sc-logo { font-size: 11px; opacity: 0.7; margin-bottom: 4px; }
  #summary-canvas .sc-header h2 { font-size: 18px; font-weight: 600; }
  #summary-canvas .sc-header .sc-company { font-size: 13px; opacity: 0.9; margin-top: 4px; }
  #summary-canvas .sc-header .sc-date { font-size: 11px; opacity: 0.7; margin-top: 2px; }
  #summary-canvas .sc-totals { display: flex; gap: 10px; margin-bottom: 16px; }
  #summary-canvas .sc-total-cell { flex: 1; background: #f0f3f8; border-radius: 8px; padding: 12px; text-align: center; }
  #summary-canvas .sc-total-cell .tl { font-size: 10px; color: #666; margin-bottom: 4px; line-height: 1.3; }
  #summary-canvas .sc-total-cell .tv { font-size: 16px; font-weight: 700; color: #1e3a6e; }
  #summary-canvas .sc-total-cell.k .tv { color: #0f6e56; }
  #summary-canvas table { width: 100%; border-collapse: collapse; font-size: 11px; }
  #summary-canvas table th { background: #1e3a6e; color: #fff; padding: 7px 8px; text-align: right; font-weight: 600; }
  #summary-canvas table th:first-child { text-align: left; }
  #summary-canvas table td { padding: 5px 8px; border-bottom: 1px solid #eef0f5; text-align: right; }
  #summary-canvas table td:first-child { text-align: left; }
  #summary-canvas table tr.sec-hd td { background: #f0f3f8; font-weight: 600; color: #1e3a6e; text-align: left; }
  #summary-canvas table td.kd { color: #0f6e56; font-weight: 600; }
  #summary-canvas table td.ku { color: #c0392b; font-weight: 600; }
  #summary-canvas .sc-footer { margin-top: 20px; font-size: 11px; color: #aaa; text-align: center; }

  @media (max-width: 640px) {
    .col-headers, .item-row { grid-template-columns: 1.5fr 0.8fr 0.8fr 0.8fr 0.8fr 0.8fr; font-size: 10px; padding: 5px 10px; }
    .totals-grid { grid-template-columns: repeat(3, 1fr); }
  }
</style>
</head>
<body>
<div class="page-wrap">

  <div class="page-header">
    <div class="logo">TOHOKU COPY SALE</div>
    <h1>ランニングコスト診断チェックリスト</h1>
    <p>各項目に金額を入力してください。改善額は自動で計算されます。</p>
  </div>

  <div class="company-field">
    <label>会社名</label>
    <input type="text" id="companyName" placeholder="例：株式会社〇〇" />
  </div>

  <div id="sections"></div>

  <div class="totals-card">
    <div class="totals-grid">
      <div class="total-cell"><div class="t-label">1回目 合計</div><div class="t-val" id="tot0">¥0</div></div>
      <div class="total-cell"><div class="t-label">2回目 合計</div><div class="t-val" id="tot1">¥0</div></div>
      <div class="total-cell"><div class="t-label">3回目 合計</div><div class="t-val" id="tot2">¥0</div></div>
      <div class="total-cell kaizen"><div class="t-label">改善額①<br>1回目→2回目</div><div class="t-val" id="tot3">¥0</div></div>
      <div class="total-cell kaizen"><div class="t-label">改善額②<br>2回目→3回目</div><div class="t-val" id="tot4">¥0</div></div>
    </div>
  </div>

  <div class="submit-area">
    <p>入力内容を確認のうえ送信してください。</p>
    <button class="btn-submit" id="submitBtn" onclick="submitData()">スプレッドシートに送信</button>
    <div class="msg-error" id="msgError"></div>
  </div>

  <div class="result-area" id="resultArea">
    <div class="success-msg">✅ 送信が完了しました！</div>
    <div class="success-sub">下のボタンからお客様控えをダウンロードできます。</div>
    <button class="btn-download" onclick="downloadJpeg()">📥 お客様控えをダウンロード（JPEG）</button>
  </div>

</div>

<div id="summary-canvas"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
// =============================================
const GAS_URL = "https://script.google.com/macros/s/AKfycbwRXYNssLUHrC9CVi1VOwHaKMdBnoWjXaLL6EVVrfqi72_rLSXkMM_U5sRZBo393aAjQg/exec";
// =============================================

const SECTIONS = [
  { name: "施設関連費", items: ["オフィス・店舗の賃貸料（共益費）","電気代","ガス代","水道代","建物の修繕費","清掃業者との保守契約費","事業所ごみ・産業廃棄物処理費"] },
  { name: "機器関連費", items: ["OA機器（PC、プリンタ、コピー機など）購入・リース","サーバ・ネットワーク機器","ソフトウェアライセンス費用","保守契約費用（PC、プリンター）","減価償却費（資産の償却）","リース料（車両・設備など）","その他保守費用"] },
  { name: "通信費",   items: ["電話代（固定・携帯）","インターネット回線費","クラウドサービス利用料","郵便料金"] },
  { name: "外注費",   items: ["デザイン・制作外注","コンサルティング費用","顧問料（会計士・税務士・社労士・弁護士）"] },
  { name: "販管費",   items: ["広告費","販促グッズ制作費","展示会出展費","営業交通費"] },
  { name: "その他",   items: ["配送料・運送費","倉庫保管料","梱包材費","保険関連"] },
  { name: "消耗品",   items: ["名刺","封筒","事務用品全般"] }
];
const INPUT_COLS = ["1回目","2回目","3回目"];

// セクション生成
const container = document.getElementById("sections");
SECTIONS.forEach((sec, si) => {
  const div = document.createElement("div");
  div.className = "section";
  const rowsHtml = sec.items.map((item, ri) =>
    `<div class="item-row" id="row_${si}_${ri}">
      <label>${item}</label>
      ${INPUT_COLS.map((col, ci) =>
        `<input type="number" id="inp_${si}_${ri}_${ci}" min="0" step="100"
          placeholder="0" oninput="recalc()" />`
      ).join("")}
      <div class="kaizen-val zero" id="k1_${si}_${ri}">—</div>
      <div class="kaizen-val zero" id="k2_${si}_${ri}">—</div>
    </div>`
  ).join("");
  div.innerHTML = `
    <div class="section-header" onclick="toggleSec(this)">
      <span>${sec.name}</span><span class="toggle">▼</span>
    </div>
    <div class="section-body">
      <div class="col-headers">
        <div class="col-h">項目</div>
        <div class="col-h">1回目</div>
        <div class="col-h">2回目</div>
        <div class="col-h">3回目</div>
        <div class="col-h kaizen">改善額①<br>1→2回目</div>
        <div class="col-h kaizen">改善額②<br>2→3回目</div>
      </div>
      ${rowsHtml}
      <div class="note-row"><textarea id="note_${si}" placeholder="備考"></textarea></div>
    </div>`;
  container.appendChild(div);
});

function toggleSec(header) {
  header.nextElementSibling.classList.toggle("hidden");
  header.classList.toggle("closed");
}

function fmt(n) { return "¥" + Math.round(Math.abs(n)).toLocaleString("ja-JP"); }

function fmtDiff(d, el) {
  if (d === 0) {
    el.textContent = "—";
    el.className = "kaizen-val zero";
  } else if (d > 0) {
    el.textContent = "▼ " + fmt(d);
    el.className = "kaizen-val down";
  } else {
    el.textContent = "▲ " + fmt(d);
    el.className = "kaizen-val up";
  }
}

function recalc() {
  const totals = [0, 0, 0];
  SECTIONS.forEach((sec, si) => {
    sec.items.forEach((_, ri) => {
      const v = INPUT_COLS.map((_, ci) =>
        parseFloat(document.getElementById(`inp_${si}_${ri}_${ci}`)?.value) || 0
      );
      totals[0] += v[0];
      totals[1] += v[1];
      totals[2] += v[2];

      const d1 = v[0] - v[1];
      const d2 = v[1] - v[2];
      fmtDiff(d1, document.getElementById(`k1_${si}_${ri}`));
      fmtDiff(d2, document.getElementById(`k2_${si}_${ri}`));
    });
  });

  for(let i=0;i<3;i++) document.getElementById(`tot${i}`).textContent = fmt(totals[i]);
  const diff1 = totals[0] - totals[1];
  const diff2 = totals[1] - totals[2];

  const t3 = document.getElementById("tot3");
  const t4 = document.getElementById("tot4");
  t3.textContent = (diff1 >= 0 ? "▼ " : "▲ ") + fmt(diff1);
  t3.style.color = diff1 >= 0 ? "#0f6e56" : "#c0392b";
  t4.textContent = (diff2 >= 0 ? "▼ " : "▲ ") + fmt(diff2);
  t4.style.color = diff2 >= 0 ? "#0f6e56" : "#c0392b";
}

function collectData() {
  const sections = {};
  const totals = [0, 0, 0];
  SECTIONS.forEach((sec, si) => {
    sections[sec.name] = {};
    sec.items.forEach((item, ri) => {
      sections[sec.name][item] = {};
      INPUT_COLS.forEach((col, ci) => {
        const v = parseFloat(document.getElementById(`inp_${si}_${ri}_${ci}`)?.value) || 0;
        sections[sec.name][item][col] = v;
        totals[ci] += v;
      });
    });
    sections[sec.name]["備考"] = document.getElementById(`note_${si}`)?.value || "";
  });
  return {
    companyName: document.getElementById("companyName").value.trim(),
    sections,
    totals: {
      "1回目": totals[0],
      "2回目": totals[1],
      "3回目": totals[2],
      "改善額①(1→2回目)": totals[0] - totals[1],
      "改善額②(2→3回目)": totals[1] - totals[2]
    }
  };
}

let lastPayload = null;

function submitData() {
  const payload = collectData();
  lastPayload = payload;
  const btn = document.getElementById("submitBtn");
  const msgErr = document.getElementById("msgError");
  btn.disabled = true;
  btn.textContent = "送信中...";
  msgErr.style.display = "none";

  fetch(GAS_URL, {
    method: "POST",
    mode: "no-cors",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  })
  .then(() => {
    btn.textContent = "送信完了";
    const r = document.getElementById("resultArea");
    r.style.display = "block";
    r.scrollIntoView({ behavior: "smooth" });
  })
  .catch(err => {
    msgErr.textContent = "送信できませんでした: " + err.message;
    msgErr.style.display = "block";
    btn.disabled = false;
    btn.textContent = "スプレッドシートに送信";
  });
}

function downloadJpeg() {
  if (!lastPayload) return;
  const p = lastPayload;
  const t = p.totals;
  const now = new Date().toLocaleString("ja-JP");
  const d1 = t["改善額①(1→2回目)"];
  const d2 = t["改善額②(2→3回目)"];

  let tableRows = "";
  SECTIONS.forEach(sec => {
    tableRows += `<tr class="sec-hd"><td colspan="6">${sec.name}</td></tr>`;
    sec.items.forEach(item => {
      const d = p.sections[sec.name]?.[item] || {};
      const v = INPUT_COLS.map(c => d[c] || 0);
      if (!v.some(x => x > 0)) return;
      const diff1 = v[0] - v[1];
      const diff2 = v[1] - v[2];
      const cls1 = diff1 > 0 ? "kd" : diff1 < 0 ? "ku" : "";
      const cls2 = diff2 > 0 ? "kd" : diff2 < 0 ? "ku" : "";
      tableRows += `<tr>
        <td style="padding-left:14px;">${item}</td>
        ${v.map(x => `<td>${x > 0 ? fmt(x) : "—"}</td>`).join("")}
        <td class="${cls1}">${diff1 !== 0 ? (diff1>0?"▼ ":"▲ ")+fmt(diff1) : "—"}</td>
        <td class="${cls2}">${diff2 !== 0 ? (diff2>0?"▼ ":"▲ ")+fmt(diff2) : "—"}</td>
      </tr>`;
    });
    const note = p.sections[sec.name]?.["備考"];
    if (note) tableRows += `<tr><td colspan="6" style="font-size:10px;color:#888;padding-left:14px;">備考：${note}</td></tr>`;
  });

  document.getElementById("summary-canvas").innerHTML = `
    <div class="sc-header">
      <div class="sc-logo">TOHOKU COPY SALE</div>
      <h2>ランニングコスト診断 お客様控え</h2>
      <div class="sc-company">${p.companyName || "（会社名未入力）"}</div>
      <div class="sc-date">送信日時：${now}</div>
    </div>
    <div class="sc-totals">
      <div class="sc-total-cell"><div class="tl">1回目</div><div class="tv">${fmt(t["1回目"])}</div></div>
      <div class="sc-total-cell"><div class="tl">2回目</div><div class="tv">${fmt(t["2回目"])}</div></div>
      <div class="sc-total-cell"><div class="tl">3回目</div><div class="tv">${fmt(t["3回目"])}</div></div>
      <div class="sc-total-cell k"><div class="tl">改善額①<br>1→2回目</div><div class="tv">${(d1>=0?"▼ ":"▲ ")+fmt(d1)}</div></div>
      <div class="sc-total-cell k"><div class="tl">改善額②<br>2→3回目</div><div class="tv">${(d2>=0?"▼ ":"▲ ")+fmt(d2)}</div></div>
    </div>
    <table>
      <thead><tr>
        <th style="text-align:left;">項目</th>
        <th>1回目</th><th>2回目</th><th>3回目</th>
        <th>改善額①<br>1→2回目</th>
        <th>改善額②<br>2→3回目</th>
      </tr></thead>
      <tbody>${tableRows}</tbody>
    </table>
    <div class="sc-footer">東北コピー販売株式会社　TEL: 024-559-0245　〒960-8252 福島市御山一本松13-5</div>
  `;

  const el = document.getElementById("summary-canvas");
  el.style.display = "block";

  html2canvas(el, { scale: 2, useCORS: true, backgroundColor: "#ffffff" }).then(canvas => {
    const link = document.createElement("a");
    const company = (p.companyName || "控え").replace(/\s/g, "_");
    link.download = `ランニングコスト診断_${company}_${new Date().toLocaleDateString("ja-JP").replace(/\//g,"-")}.jpg`;
    link.href = canvas.toDataURL("image/jpeg", 0.95);
    link.click();
    el.style.display = "none";
  });
}
</script>
</body>
</html>
